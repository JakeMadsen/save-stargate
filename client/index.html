<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Save The Gate is a fan-run Stargate campaign tracking petitions, public contacts, updates, fan voices, and community action." />
    <meta name="robots" content="index,follow" />
    <meta property="og:site_name" content="Save The Gate" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Save The Gate" />
    <meta property="og:description" content="Fan-run Stargate campaign tracking petitions, public contacts, updates, fan voices, and community action." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="theme-color" content="#071015" />
    <title>Save The Gate</title>
    <script>
      (() => {
        try {
          const saved = localStorage.getItem("save-the-gate-theme");
          const theme = saved === "dark" || saved === "light" ? saved : "light";
          document.documentElement.dataset.theme = theme;
        } catch {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
